name: Build and deploy app

on:
  push

# CONFIGURATION
env:
  AZURE_WEBAPP_NAME: FintechAppService                   # Your application's name
  AZURE_WEBAPP_PACKAGE_PATH: '.'                         # Path to your web app project, defaults to the repository root
  DOTNET_VERSION: '8.0'                                  # Set this to .NET 8
  AZURE_RESOURCEGROUP_NAME: FintechAppResourceGroup      # Your resource group name
  SQLSERVER_NAME: fintechsqlserver                       # Your SQL server name
  DATABASE_NAME: fintechdatabase                         # Your SQL database name
  SQLADMIN_LOGIN: ${{ secrets.SQLADMIN_LOGIN }}          # SQL Admin login from secrets
  SQLADMIN_PASS: ${{ secrets.SQLADMIN_PASS }}            # SQL Admin password from secrets
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      # Checkout the repo
      - uses: actions/checkout@v2
      
      # Setup .NET Core SDK
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }} 
      
      # Run dotnet build and publish
      - name: dotnet build and publish
        run: |
          dotnet build --configuration Release
          dotnet publish -c Release -o myapp 
          
      # Deploy to Azure Web App using publish profile
      - name: 'Run Azure webapp deploy action using publish profile credentials'
        uses: azure/webapps-deploy@v2
        with: 
          app-name: ${{ env.AZURE_WEBAPP_NAME }}            # Your app name
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}  # Publish profile from secrets
          package: '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/myapp'
          slot-name: production

      # Azure CLI Login using Service Principal with Client Secret
      - name: Login for az cli commands 
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      
      # Create DB connection string
      - name: create db connection string
        run: |
          CONN_STR=$(az sql db show-connection-string --client ado.net --server ${{ env.SQLSERVER_NAME }} --name ${{ env.DATABASE_NAME }} -o tsv)
          CONN_STR=$(echo $CONN_STR | sed "s/<username>/${{ env.SQLADMIN_LOGIN }}/g")
          CONN_STR=$(echo $CONN_STR | sed "s/<password>/${{ env.SQLADMIN_PASS }}/g")
          echo "SQL_DB_CONN_STR=$CONN_STR" >> $GITHUB_ENV

      # Update Database
      - name: Update Database
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef database update
        env:
          ConnectionStrings__MyDbConnection: ${{ env.SQL_DB_CONN_STR }}
      
      # Swap to production slot (if you are using a staging slot)
      - name: Swap to production slot
        if: always()  # only if you are using a staging slot
        run: |
          az webapp deployment slot swap --resource-group ${{ env.AZURE_RESOURCEGROUP_NAME }} --name ${{ env.AZURE_WEBAPP_NAME }} --slot staging --target-slot production
          echo "Swap finished. App Service Application URL: https://$(az webapp show --resource-group ${{ env.AZURE_RESOURCEGROUP_NAME }} --name ${{ env.AZURE_WEBAPP_NAME }} --query hostNames[0] -o tsv)"
