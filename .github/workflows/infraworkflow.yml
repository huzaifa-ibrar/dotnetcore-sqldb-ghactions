name: Create Azure Resources

on: 
  push:
    paths: 
      - 'ARM/**'
      - '.github/workflows/infraworkflow.yml'

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}    # Azure Subscription ID
  AZURE_RESOURCEGROUP_NAME: FintechAppResourceGroup               # Resource group name
  AZURE_WEBAPP_NAME: FintechAppService                            # Web App name
  ASP_NAME: FintechAppServicePlan                                 # App Service Plan name
  SQLSERVER_NAME: fintechsqlserver                                # SQL Server name
  DATABASE_NAME: fintechdatabase                                  # SQL Database name
  SQLADMIN_LOGIN: ${{ secrets.SQLADMIN_LOGIN }}                   # SQL Admin login
  SQLADMIN_PASS: ${{ secrets.SQLADMIN_PASS }}                     # SQL Admin password

jobs:
  build-and-deploy-to-dev:
    runs-on: ubuntu-latest
    steps:

      # Azure Login with Federated Identity
      - name: Azure Login with Federated Identity
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Checkout
      - name: Checkout
        uses: actions/checkout@v2
        with:
          path: repo

      # Deploy Resource Group Template
      - name: Deploy ARM Template for Resource Group
        uses: azure/arm-deploy@v1
        with:
          scope: subscription
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          region: canadacentral
          template: repo/templates/azuredeploy.resourcegroup.json
          parameters: repo/templates/azuredeploy.resourcegroup.parameters.json rgName=${{ env.AZURE_RESOURCEGROUP_NAME }}

      # Deploy Resources Template
      - name: Deploy ARM Template for Resources
        uses: azure/arm-deploy@v1
        with:
          scope: resourcegroup
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.AZURE_RESOURCEGROUP_NAME }}
          region: canadacentral
          template: repo/templates/azuredeploy.json
          parameters: repo/templates/azuredeploy.parameters.json webappName=${{ env.AZURE_WEBAPP_NAME }} aspName=${{ env.ASP_NAME }} sqlServerName=${{ env.SQLSERVER_NAME }} databaseName=${{ env.DATABASE_NAME }} sqlAdminLogin=${{ env.SQLADMIN_LOGIN }} sqlAdminPass=${{ env.SQLADMIN_PASS }}
