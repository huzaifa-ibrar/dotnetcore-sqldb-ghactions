name: Create Azure Resources

on: 
  push:
    paths: 
      - 'ARM/**'
      - '.github/workflows/infraworkflow.yml'

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}    # Your Azure Subscription ID
  AZURE_RESOURCEGROUP_NAME: demo-webappsql-gh-actions            # Your resource group name
  AZURE_WEBAPP_NAME: demo-webappsql-gh-actions-unique            # Web app name
  ASP_NAME: demo-webappsql-gh-actions                            # App Service Plan name
  SQLSERVER_NAME: demo-webappsql-gh-actions-srv                  # SQL server name
  DATABASE_NAME: demo-webappsql-gh-actions-db                    # SQL database name
  SQLADMIN_LOGIN: ${{ secrets.SQLADMIN_LOGIN }}                  # SQL Admin login (GitHub secret)
  SQLADMIN_PASS: ${{ secrets.SQLADMIN_PASS }}                    # SQL Admin password (GitHub secret)

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy-to-dev:
    runs-on: ubuntu-latest
    steps:

      # Login with Federated Identity
      - name: Azure Login with Federated Identity
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v2
        with:
          path: repo
          
      # Deploy Resource Group Template    
      - name: Deploy ARM Template resourcegroup
        uses: azure/arm-deploy@v1
        with:
          scope: subscription
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          region: centralus # Set this to your target region
          template: repo/templates/azuredeploy.resourcegroup.json  # Path to the resource group template
          parameters: repo/templates/azuredeploy.resourcegroup.parameters.json rgName=${{ env.AZURE_RESOURCEGROUP_NAME }}

      # Deploy Resources Template    
      - name: Deploy ARM Template resources
        uses: azure/arm-deploy@v1
        with:
          scope: resourcegroup
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.AZURE_RESOURCEGROUP_NAME }}
          region: centralus # Set this to your target region
          template: repo/templates/azuredeploy.json  # Path to your resources template
          parameters: repo/templates/azuredeploy.parameters.json webappName=${{ env.AZURE_WEBAPP_NAME }} aspName=${{ env.ASP_NAME }} sqlServerName=${{ env.SQLSERVER_NAME }} databaseName=${{ env.DATABASE_NAME }} sqlAdminLogin=${{ env.SQLADMIN_LOGIN }} sqlAdminPass=${{ env.SQLADMIN_PASS }}
