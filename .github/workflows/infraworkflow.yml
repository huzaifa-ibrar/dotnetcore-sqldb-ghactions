name: Create Azure Resources

on: 
  push:
    paths: 
      - 'ARM/**'
      - '.github/workflows/infraworkflow.yml'

env:
  AZURE_SUBSCRIPTION_ID: 72e7bb81-e5a0-4c0d-ac9d-702d05d687ec    # Set this to your Azure Subscription Id
  AZURE_RESOURCEGROUP_NAME: FintechAppResourceGroup                     # Update this to your resource group name
  AZURE_WEBAPP_NAME: FintechAppService                                  # Update this to your web app name
  ASP_NAME: FintechAppServicePlan                                       # Update this to your App Service Plan name
  SQLSERVER_NAME: fintechsqlserver                                      # Update this to your SQL server name
  DATABASE_NAME: fintechdatabase                                        # Update this to your SQL database name
  SQLADMIN_LOGIN: hibrar1.admin                         # SQL Admin login name from secrets
  SQLADMIN_PASS: Smile580.***                           # SQL Admin password from secrets

jobs:
  build-and-deploy-to-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login with Federated Identity
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      # Checkout
      - name: Checkout
        uses: actions/checkout@v2
        with:
          path: repo
          
      # Deploy Resource Group template    
      - name: Deploy ARM Template resourcegroup
        uses: azure/arm-deploy@v1
        with:
          scope: subscription
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          region: canadacentral  # Update this to your target region
          template: repo/templates/azuredeploy.resourcegroup.json  # Path to your resource group template
          parameters: repo/templates/azuredeploy.resourcegroup.parameters.json rgName=${{ env.AZURE_RESOURCEGROUP_NAME }}

      # Deploy Resources template   
      - name: Deploy ARM Template resources
        uses: azure/arm-deploy@v1
        with:
          scope: resourcegroup
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.AZURE_RESOURCEGROUP_NAME }}
          region: canadacentral  # Update this to your target region
          template: repo/templates/azuredeploy.json  # Path to your resources template
          parameters: repo/templates/azuredeploy.parameters.json webappName=${{ env.AZURE_WEBAPP_NAME }} aspName=${{ env.ASP_NAME }} sqlServerName=${{ env.SQLSERVER_NAME }} databaseName=${{ env.DATABASE_NAME }} sqlAdminLogin=${{ env.SQLADMIN_LOGIN }} sqlAdminPass=${{ env.SQLADMIN_PASS }}
